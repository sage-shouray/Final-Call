version: "3.9"

# Development override — mounts source code for hot-reload
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../apps/api/src:/app/src:delegated
    environment:
      ENV: development
      DEBUG: "true"

  worker:
    command: celery -A src.workers.celery_app worker --loglevel=debug --concurrency=2 --autoreload
    volumes:
      - ../apps/api/src:/app/src:delegated
    environment:
      ENV: development

  web:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --host 0.0.0.0"
    volumes:
      - ../apps/web:/app:delegated
      - web_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development

  # Mongo Express — DB admin UI in dev only
  mongo-express:
    image: mongo-express:1.0
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-admin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-changeme}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongodb
    networks:
      - docparser_net

  # Redis Commander — cache inspector in dev only
  redis-commander:
    image: rediscommander/redis-commander:latest
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: "local:redis:6379:0:${REDIS_PASSWORD:-changeme}"
    depends_on:
      - redis
    networks:
      - docparser_net

volumes:
  web_node_modules:
